name: ci

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

on:
  pull_request:
  push:
    branches:
      - '**'
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  test:
    name: Test ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test
        run: |
          rustup target add ${{ matrix.target }}
          cargo test --all --target ${{ matrix.target }} --release

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust nightly
        run: |
          rustup toolchain install nightly --component llvm-tools-preview
          rustup default nightly
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  test-results:
    if: always()
    needs: [ test, coverage ]
    runs-on: ubuntu-24.04
    steps:
      - run: |
          results=("${{ needs.test.result }}" "${{ needs.coverage.result }}")
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "One or more jobs failed" >&2
              exit 1
            fi
          done
          echo "All tests passed"

  version:
    name: Determine version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Determine version
        id: version
        run: |
          # push to deploy branch returns dev-$SHA
          # tag pushes return the tag
          SHA="$(cut -c-8 <<< "$GITHUB_SHA")"
          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            echo "VERSION=dev-${SHA}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == 'refs/tags/'* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "VERSION=${VERSION}-${SHA}" >> $GITHUB_OUTPUT
          fi
      - name: Print version
        run: |
          echo Building version: ${{ steps.version.outputs.VERSION }}

  docker:
    needs: [version]
    permissions:
      contents: read
      packages: write
      security-events: write
    uses: USA-RedDragon/reusable-actions/.github/workflows/docker-ci.yaml@ba338faac060b1f62598fb2aea122db3926aad6e # v2.0.18
    with:
      push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
      build-args: |
        PKG_VERSION=${{ needs.version.outputs.version }}
        GIT_COMMIT=${{ github.sha }}
